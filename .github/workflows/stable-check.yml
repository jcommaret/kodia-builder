name: stable-check

on:
  workflow_call:
    outputs:
      MS_COMMIT:
        value: ${{ jobs.check.outputs.MS_COMMIT }}
      MS_TAG:
        value: ${{ jobs.check.outputs.MS_TAG }}
      RELEASE_VERSION:
        value: ${{ jobs.check.outputs.RELEASE_VERSION }}
      RELEASE_TITLE:
        value: ${{ jobs.check.outputs.RELEASE_TITLE }}
      VOID_VERSION:
        value: ${{ jobs.check.outputs.VOID_VERSION }}
      SHOULD_BUILD:
        value: ${{ jobs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY:
        value: ${{ jobs.check.outputs.SHOULD_DEPLOY }}

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  APP_NAME: Kodia
  ASSETS_REPOSITORY: jcommaret/void
  BINARY_NAME: void
  DISABLE_UPDATE: 'yes'
  GH_REPO_PATH: jcommaret/void
  ORG_NAME: jcommaret
  VERSIONS_REPOSITORY: jcommaret/void
  VSCODE_QUALITY: stable

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      MS_COMMIT: ${{ steps.check.outputs.MS_COMMIT || env.MS_COMMIT }}
      MS_TAG: ${{ steps.check.outputs.MS_TAG || env.MS_TAG }}
      RELEASE_VERSION: ${{ steps.check.outputs.RELEASE_VERSION || env.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ env.RELEASE_TITLE }}
      VOID_VERSION: ${{ steps.check.outputs.VOID_VERSION || env.VOID_VERSION }}
      SHOULD_BUILD: ${{ steps.check.outputs.SHOULD_BUILD || env.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ steps.check.outputs.SHOULD_DEPLOY || env.SHOULD_DEPLOY }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout builder PR and clone Kodia
        env:
          PULL_REQUEST_ID: ${{ github.event.inputs.checkout_pr }}
          VOID_COMMIT: ${{ github.event.inputs.void_commit }}
          VOID_RELEASE: ${{ github.event.inputs.void_release }}
        run: ./ci_repo.sh

      - name: CI check (versions, release, flags)
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STRONGER_GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          SKIP_VERSION_BUMP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.increment_version == 'false' && 'yes' || '' }}
          INCREMENT_MINOR: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.increment_minor == 'true' && 'yes' || '' }}
          CHECK_ALL: 'yes'
        run: ./ci_check.sh
