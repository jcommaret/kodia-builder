name: stable-macos

on:
  workflow_call:
    inputs:
      MS_COMMIT:
        required: true
        type: string
      MS_TAG:
        required: true
        type: string
      RELEASE_VERSION:
        required: true
        type: string
      RELEASE_TITLE:
        required: true
        type: string
      VOID_VERSION:
        required: true
        type: string
      SHOULD_BUILD:
        required: true
        type: string
      SHOULD_DEPLOY:
        required: true
        type: string

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  APP_NAME: Void
  ASSETS_REPOSITORY: jcommaret/void
  BINARY_NAME: void
  DISABLE_UPDATE: 'yes'
  GH_REPO_PATH: jcommaret/void
  ORG_NAME: jcommaret
  VERSIONS_REPOSITORY: jcommaret/void
  VSCODE_QUALITY: stable

jobs:
  build_macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: X64
            vscode_arch: x64
            npm_arch: x64
          - slug: ARM64
            vscode_arch: arm64
            npm_arch: arm64
    env:
      DISABLED: ${{ vars[format('DISABLE_STABLE_MACOS_APP_{0}', matrix.slug)] }}
      MS_COMMIT: ${{ inputs.MS_COMMIT }}
      MS_TAG: ${{ inputs.MS_TAG }}
      RELEASE_VERSION: ${{ inputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ inputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ inputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ inputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ inputs.SHOULD_DEPLOY }}
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
      OS_NAME: osx

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.GITHUB_BRANCH }}
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Switch to relevant branch
        env:
          PULL_REQUEST_ID: ${{ github.event.inputs.checkout_pr }}
        run: ./get_pr.sh
        if: env.DISABLED != 'yes'

      - name: Setup Node.js environment
        uses: actions/setup-node@v5
        with:
          node-version: '22.22.2'
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Clone VSCode repo
        env:
          VOID_COMMIT: ${{ github.event.inputs.void_commit }}
          VOID_RELEASE: ${{ github.event.inputs.void_release }}
        run: ./get_repo.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Install GH
        run: ./install_gh.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes' && env.SHOULD_DEPLOY == 'yes'

      - name: Check existing VSCodium tags/releases
        env:
          CHECK_REH: 'no'
          DISABLE_DMG: ${{ vars.DISABLE_STABLE_DMG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./check_tags.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: ${{ matrix.npm_arch }}
          OS_NAME: osx
        run: ./build.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Clean dependencies cache
        run: rm -rf /tmp/vscode-amd64-sysroot /tmp/debian_bullseye_amd64-sysroot
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Prepare assets
        env:
          SHOULD_BUILD_REH: 'no'
          SHOULD_BUILD_REH_WEB: 'no'
          SHOULD_BUILD_ZIP: 'no'
          SHOULD_BUILD_SRC: 'no'
          SHOULD_BUILD_DMG: 'yes'
          CERTIFICATE_OSX_NEW_APP_PASSWORD: ${{ secrets.CERTIFICATE_OSX_NEW_APP_PASSWORD }}
          CERTIFICATE_OSX_NEW_ID: ${{ secrets.CERTIFICATE_OSX_NEW_ID }}
          CERTIFICATE_OSX_NEW_P12_DATA: ${{ secrets.CERTIFICATE_OSX_NEW_P12_DATA }}
          CERTIFICATE_OSX_NEW_P12_PASSWORD: ${{ secrets.CERTIFICATE_OSX_NEW_P12_PASSWORD }}
          CERTIFICATE_OSX_NEW_TEAM_ID: ${{ secrets.CERTIFICATE_OSX_NEW_TEAM_ID }}
        run: ./prepare_assets.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: ./release.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes' && env.SHOULD_DEPLOY == 'yes'

      - name: Update versions repo
        env:
          FORCE_UPDATE: ${{ github.event.inputs.force_version }}
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          git config --global url."https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com".insteadOf "https://github.com"
          ./update_version.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes' && env.SHOULD_DEPLOY == 'yes'

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: void-macos-${{ matrix.vscode_arch }}
          path: assets/
          retention-days: 3
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'
