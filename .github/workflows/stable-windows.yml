name: stable-windows

on:
  workflow_call:
    inputs:
      BUILD_SOURCEVERSION:
        required: true
        type: string
      MS_COMMIT:
        required: true
        type: string
      MS_TAG:
        required: true
        type: string
      RELEASE_VERSION:
        required: true
        type: string
      RELEASE_TITLE:
        required: true
        type: string
      VOID_VERSION:
        required: true
        type: string
      SHOULD_BUILD:
        required: true
        type: string
      SHOULD_DEPLOY:
        required: true
        type: string

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  APP_NAME: Void
  ASSETS_REPOSITORY: jcommaret/void
  BINARY_NAME: void
  DISABLE_UPDATE: 'yes'
  GH_REPO_PATH: jcommaret/void
  ORG_NAME: jcommaret
  VERSIONS_REPOSITORY: jcommaret/void
  VSCODE_QUALITY: stable

jobs:
  build_windows:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: X64
            vscode_arch: x64
            npm_arch: x64
          - slug: ARM64
            vscode_arch: arm64
            npm_arch: arm64
    env:
      BUILD_SOURCEVERSION: ${{ inputs.BUILD_SOURCEVERSION }}
      DISABLED: ${{ vars[format('DISABLE_STABLE_WINDOWS_APP_{0}', matrix.slug)] }}
      MS_COMMIT: ${{ inputs.MS_COMMIT }}
      MS_TAG: ${{ inputs.MS_TAG }}
      RELEASE_VERSION: ${{ inputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ inputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ inputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ inputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ inputs.SHOULD_DEPLOY }}
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
      OS_NAME: windows
      npm_config_msvs_version: '2022'

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.GITHUB_BRANCH }}
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Checkout builder PR
        env:
          PULL_REQUEST_ID: ${{ github.event.inputs.checkout_pr }}
        run: ./ci_repo.sh pr
        if: env.DISABLED != 'yes'

      - name: Platform CI setup
        env:
          CHECK_REH: 'no'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_GH_INSTALL: ${{ env.SHOULD_DEPLOY != 'yes' && 'yes' || '' }}
        run: ./ci_platform.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Download vscode artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.vscode_arch == 'arm64' && 'amd64_arm64' || 'x64' }}
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: ${{ matrix.npm_arch }}
        run: ./build/windows/package.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Prepare assets
        env:
          SHOULD_BUILD_REH: 'no'
          SHOULD_BUILD_REH_WEB: 'no'
        run: ./prepare_assets.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Upload to GitHub release
        env:
          STRONGER_GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.STRONGER_GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: ./release.sh
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'

      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: void-windows-${{ matrix.vscode_arch }}
          path: assets/
          retention-days: 3
        if: env.DISABLED != 'yes' && env.SHOULD_BUILD == 'yes'
