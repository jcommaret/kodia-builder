# Orchestrateur CI stable : check → compile (vscode.tar.gz) → builds en parallèle.
# Jobs détaillés dans stable-*.yml (workflow_call). Un seul compile par exécution.
name: stable

on:
  workflow_dispatch:
    inputs:
      force_version:
        type: boolean
        description: Force update version
      increment_version:
        type: boolean
        description: Increment voidVersion (minor, patch 0) before release
        default: true
  repository_dispatch:
    types: [stable]
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'upstream/*.json'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  APP_NAME: Void
  ASSETS_REPOSITORY: jcommaret/void
  BINARY_NAME: void
  DISABLE_UPDATE: 'yes'
  GH_REPO_PATH: jcommaret/void
  ORG_NAME: jcommaret
  VERSIONS_REPOSITORY: jcommaret/void
  VSCODE_QUALITY: stable

jobs:
  check:
    uses: ./.github/workflows/stable-check.yml
    secrets: inherit

  compile:
    needs: [check]
    uses: ./.github/workflows/stable-compile.yml
    with:
      MS_COMMIT: ${{ needs.check.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.check.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ needs.check.outputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ needs.check.outputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ needs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ needs.check.outputs.SHOULD_DEPLOY }}
    secrets: inherit

  build_macos:
    needs: [check]
    uses: ./.github/workflows/stable-macos.yml
    with:
      MS_COMMIT: ${{ needs.check.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.check.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ needs.check.outputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ needs.check.outputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ needs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ needs.check.outputs.SHOULD_DEPLOY }}
    secrets: inherit

  build_linux:
    needs: [check, compile]
    uses: ./.github/workflows/stable-linux.yml
    with:
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ needs.check.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.check.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ needs.check.outputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ needs.check.outputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ needs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ needs.check.outputs.SHOULD_DEPLOY }}
    secrets: inherit

  build_windows:
    needs: [check, compile]
    uses: ./.github/workflows/stable-windows.yml
    with:
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ needs.check.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.check.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ needs.check.outputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ needs.check.outputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ needs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ needs.check.outputs.SHOULD_DEPLOY }}
    secrets: inherit

  reh_linux:
    needs: [check, compile]
    uses: ./.github/workflows/stable-reh-linux.yml
    with:
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ needs.check.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.check.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.check.outputs.RELEASE_VERSION }}
      RELEASE_TITLE: ${{ needs.check.outputs.RELEASE_TITLE }}
      VOID_VERSION: ${{ needs.check.outputs.VOID_VERSION }}
      SHOULD_BUILD: ${{ needs.check.outputs.SHOULD_BUILD }}
      SHOULD_DEPLOY: ${{ needs.check.outputs.SHOULD_DEPLOY }}
    secrets: inherit
